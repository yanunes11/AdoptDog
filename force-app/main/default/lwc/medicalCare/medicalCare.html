<template>
    <lightning-card title="Medial Care" icon-name="custom:custom1">
        <div class="slds-card slds-p-around_xx-small">
            <lightning-record-edit-form object-api-name="Contact" onsubmit={handleSubmit}>
                <lightning-input-field field-name="LastName" value={contact.LastName}></lightning-input-field>
            </lightning-record-edit-form>
        </div>
        <div class="slds-clearfix slds-p-around_xx-small">
            <lightning-button 
                variant="brand" 
                type="submit"
                label="Create"
                class="slds-float_right"
                onclick={handleSubmit}>
            </lightning-button>
            <lightning-button variant="destructive-text" label="Cancel" slot="actions" class="slds-float_right"></lightning-button>
        </div>

    </lightning-card>
</template>
